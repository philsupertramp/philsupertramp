name: Daily website test

on:
  schedule:
    - cron: "0 0 * * *"


jobs:
  check_blog:
    runs-on: ubuntu-latest
    name: Tests if the blog is still up and running
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Action step
        uses: philsupertramp/chain-smoker/action@v1
        with:
          directory: '.github/chain-smoker-tests/'
